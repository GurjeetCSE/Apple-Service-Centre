<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Apple Service Centre</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        .auth-container { display:flex; justify-content:center; align-items:center; min-height:80vh; padding:40px 20px; animation:fadeUp 0.8s ease; }
        .auth-card { background:rgba(255,255,255,0.04); backdrop-filter:blur(24px); border:1px solid rgba(255,255,255,0.08); border-radius:24px; padding:48px 40px; width:100%; max-width:420px; box-shadow:0 16px 64px rgba(0,0,0,0.4); }
        .auth-card h1 { font-size:1.8rem; font-weight:700; margin-bottom:8px; text-align:center; }
        .auth-card .subtitle { text-align:center; color:#86868b; font-size:0.92rem; margin-bottom:32px; }
        .form-group { margin-bottom:18px; }
        .form-group label { display:block; font-size:0.82rem; font-weight:500; color:#a1a1a6; margin-bottom:7px; text-transform:uppercase; letter-spacing:0.5px; }
        .form-group input { width:100%; padding:14px 18px; background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1); border-radius:12px; color:#f5f5f7; font-family:'Inter',sans-serif; font-size:0.95rem; outline:none; transition:all 0.3s; box-sizing:border-box; }
        .form-group input:focus { border-color:rgba(59,130,246,0.6); background:rgba(255,255,255,0.08); box-shadow:0 0 24px rgba(59,130,246,0.12); }
        .form-group input::placeholder { color:#48484a; }
        .auth-btn { width:100%; padding:15px; background:linear-gradient(135deg,#2563eb,#3b82f6); color:#fff; border:none; border-radius:12px; font-size:1rem; font-weight:600; cursor:pointer; transition:all 0.3s; font-family:'Inter',sans-serif; margin-top:8px; box-shadow:0 4px 20px rgba(59,130,246,0.3); }
        .auth-btn:hover { transform:translateY(-2px); box-shadow:0 8px 30px rgba(59,130,246,0.45); }
        .error-msg { color:#f87171; font-size:0.85rem; text-align:center; min-height:22px; margin-top:14px; }
        .success-msg { color:#34d399; }
        .auth-footer { text-align:center; margin-top:24px; font-size:0.88rem; color:#86868b; }
        .auth-footer a { color:#60a5fa; text-decoration:none; font-weight:500; }
        .auth-footer a:hover { text-decoration:underline; }
        .divider { display:flex; align-items:center; margin:24px 0; color:#48484a; font-size:0.8rem; }
        .divider::before,.divider::after { content:''; flex:1; height:1px; background:rgba(255,255,255,0.08); }
        .divider span { padding:0 16px; }
    </style>
</head>
<body>
<header>
    <div class="logo">🍎 Apple Service Centre</div>
    <button class="menu-toggle" onclick="document.querySelector('nav').classList.toggle('open')">☰</button>
    <nav>
        <a href="index.html">Home</a>
        <a href="services.html">Services</a>
        <a href="gallery.html">Gallery</a>
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
    </nav>
</header>

<div class="auth-container">
    <div class="auth-card">
        <h1>Welcome Back</h1>
        <p class="subtitle">Sign in to your account</p>
        <form onsubmit="handleLogin(event)">
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" placeholder="you@example.com" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="auth-btn" id="loginBtn">Sign In</button>
        </form>
        <p class="error-msg" id="errorMsg"></p>
        <div class="divider"><span>or</span></div>
        <div class="auth-footer">Don't have an account? <a href="signup.html">Create one</a></div>
    </div>
</div>

<footer>
    <div class="footer-content">
        <div class="footer-logo">🍎 Apple Service Centre</div>
        <div class="footer-links">
            <a href="index.html">Home</a><a href="services.html">Services</a><a href="gallery.html">Gallery</a><a href="about.html">About</a><a href="contact.html">Contact</a>
        </div>
    </div>
    <div class="footer-bottom"><p>© 2026 Apple Service Centre. All rights reserved.</p></div>
</footer>

<script>
async function handleLogin(e) {
    e.preventDefault();
    const btn = document.getElementById('loginBtn');
    const err = document.getElementById('errorMsg');
    btn.textContent = 'Signing in...'; btn.disabled = true; err.textContent = '';
    try {
        const res = await fetch('/api/login', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ email:document.getElementById('email').value, password:document.getElementById('password').value }) });
        
        if (!res.ok) {
            const text = await res.text();
            throw new Error(`Server error: ${res.status}`);
        }
        
        const data = await res.json();
        if (data.success) { err.textContent='✅ '+data.message; err.className='error-msg success-msg'; setTimeout(()=>{ window.location.href='index.html'; },800); }
        else { err.textContent=data.message; btn.textContent='Sign In'; btn.disabled=false; }
    } catch(e) { err.textContent='Error: ' + e.message; btn.textContent='Sign In'; btn.disabled=false; }
}
</script>
<script src="auth.js"></script>
</body>
</html>
