<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Account - Apple Service Centre</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

<!-- HEADER -->
<header>
    <div class="logo">🍎 Apple Service Centre</div>
    <button class="menu-toggle" onclick="document.querySelector('nav').classList.toggle('open')" aria-label="Menu">☰</button>
    <nav>
        <a href="index.html">Home</a>
        <a href="services.html">Services</a>
        <a href="gallery.html">Gallery</a>
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
    </nav>
</header>

<!-- PROFILE SECTION -->
<section class="section">
    <div class="page-header" style="margin-bottom: 40px;">
        <h1>My Account</h1>
        <p>Manage your profile and view your service history</p>
    </div>

    <div style="max-width: 800px; margin: 0 auto;">
        <div class="glass-card" style="padding: 40px; text-align: center;">
            <div id="profile-avatar" class="skeleton skeleton-circle"></div>
            <div style="display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 5px;">
                <h2 id="profile-name" style="font-size: 2rem;"><span class="skeleton" style="width: 200px; height: 35px;"></span></h2>
                <button id="edit-btn" onclick="toggleEditMode()" style="display:none; background: none; border: none; color: #60a5fa; cursor: pointer; font-size: 1.2rem;"><i class="fas fa-edit"></i></button>
            </div>
            
            <div id="edit-form" style="display: none; margin: 20px 0;">
                <input type="text" id="edit-name" style="padding: 10px; border-radius: 8px; border: 1px solid #333; background: #000; color: #fff; width: 250px;">
                <button onclick="saveProfile()" class="btn-primary" style="padding: 8px 20px; font-size: 0.85rem; margin-left: 10px;">Save</button>
            </div>

            <p id="profile-email" style="color: #86868b; margin-bottom: 30px;"><span class="skeleton" style="width: 150px; height: 20px;"></span></p>
            
            <div style="margin-top: 40px; text-align: left;">
                <h3 style="margin-bottom: 20px; font-size: 1.4rem;"><i class="fas fa-history" style="color: #60a5fa; margin-right: 10px;"></i> Your Service History</h3>
                <div id="repairs-list">
                    <div class="skeleton-card skeleton"></div>
                    <div class="skeleton-card skeleton"></div>
                </div>
            </div>

            <div style="margin-top: 40px; display: flex; justify-content: center; gap: 15px;">
                <a href="contact.html" class="btn-primary">Book a New Repair</a>
                <button onclick="togglePasswordForm()" class="btn-secondary">Change Password</button>
                <button onclick="handleLogout()" class="btn-secondary" style="color: #f87171; border-color: rgba(248, 113, 113, 0.3);">Logout</button>
            </div>

            <div id="password-form" style="display: none; margin-top: 30px; text-align: left; background: rgba(255,255,255,0.02); padding: 25px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.05);">
                <h3 style="margin-bottom: 20px; font-size: 1.2rem;">Change Password</h3>
                <div style="margin-bottom: 15px;">
                    <label style="display: block; font-size: 0.8rem; color: #86868b; margin-bottom: 5px;">Current Password</label>
                    <input type="password" id="current-pw" style="width: 100%; padding: 10px; background: #000; border: 1px solid #333; color: #fff; border-radius: 6px;">
                </div>
                <div style="margin-bottom: 20px;">
                    <label style="display: block; font-size: 0.8rem; color: #86868b; margin-bottom: 5px;">New Password</label>
                    <input type="password" id="new-pw" style="width: 100%; padding: 10px; background: #000; border: 1px solid #333; color: #fff; border-radius: 6px;">
                </div>
                <div style="display: flex; gap: 10px;">
                    <button onclick="changePassword()" class="btn-primary" style="flex: 1;">Update Password</button>
                    <button onclick="togglePasswordForm()" class="btn-secondary" style="flex: 1;">Cancel</button>
                </div>
                <p id="pw-status" style="margin-top: 15px; font-size: 0.8rem; text-align: center;"></p>
            </div>
        </div>
    </div>
</section>

<!-- FOOTER -->
<footer>
    <div class="footer-bottom">
        <p>© 2026 Apple Service Centre. All rights reserved.</p>
    </div>
</footer>

<script src="auth.js"></script>
<script>
// Check login status and redirect if not logged in
document.addEventListener('DOMContentLoaded', async () => {
    try {
        const res = await fetch('/api/user');
        const data = await res.json();
        
        if (!data.loggedIn) {
            window.location.href = 'login.html';
            return;
        }

        // Remove skeletons and show content
        const avatar = document.getElementById('profile-avatar');
        avatar.classList.remove('skeleton', 'skeleton-circle');
        avatar.style.cssText = 'width: 100px; height: 100px; background: linear-gradient(135deg, #2563eb, #3b82f6); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 3rem; color: white; margin: 0 auto 20px;';
        avatar.innerHTML = '<i class="fas fa-user"></i>';

        document.getElementById('profile-name').textContent = data.user.name;
        document.getElementById('profile-email').textContent = data.user.email;
        document.getElementById('edit-btn').style.display = 'block';

        fetchRepairs();
    } catch (e) {
        console.error('Error fetching profile:', e);
    }
});

async function fetchRepairs() {
    const list = document.getElementById('repairs-list');
    try {
        const res = await fetch('/api/my-repairs');
        const data = await res.json();
        
        if (data.success && data.repairs.length > 0) {
            list.innerHTML = data.repairs.map(repair => `
                <div class="glass-card" style="padding: 15px 20px; margin-bottom: 15px; background: rgba(255,255,255,0.02); display: flex; justify-content: space-between; align-items: center;">
                    <div>
                        <h4 style="margin-bottom: 4px;">${repair.device_type} - ${repair.model}</h4>
                        <p style="font-size: 0.85rem; color: #86868b;">${repair.issue}</p>
                    </div>
                    <div style="text-align: right;">
                        <span style="display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 0.75rem; font-weight: 600; background: ${getStatusColor(repair.status)}; color: white;">
                            ${repair.status}
                        </span>
                        ${repair.status === 'Completed' ? `
                            <button onclick="showReviewForm('${repair.id}')" style="display: block; margin-top: 8px; font-size: 0.7rem; color: #60a5fa; background: none; border: 1px solid #60a5fa; padding: 2px 8px; border-radius: 4px; cursor: pointer;">Leave Review</button>
                        ` : ''}
                        <p style="font-size: 0.75rem; color: #424245; margin-top: 4px;">${new Date(repair.created_at).toLocaleDateString()}</p>
                    </div>
                </div>
                <div id="review-form-${repair.id}" style="display: none; margin-bottom: 20px; padding: 20px; background: rgba(37, 99, 235, 0.1); border-radius: 12px;">
                    <h5 style="margin-bottom: 10px;">Share your experience</h5>
                    <select id="rating-${repair.id}" style="width: 100%; margin-bottom: 10px; padding: 8px; background: #000; color: #fff; border: 1px solid #333;">
                        <option value="5">⭐⭐⭐⭐⭐ (Excellent)</option>
                        <option value="4">⭐⭐⭐⭐ (Great)</option>
                        <option value="3">⭐⭐⭐ (Good)</option>
                        <option value="2">⭐⭐ (Fair)</option>
                        <option value="1">⭐ (Poor)</option>
                    </select>
                    <textarea id="comment-${repair.id}" placeholder="Your feedback..." rows="2" style="width: 100%; margin-bottom: 10px; padding: 8px; background: #000; color: #fff; border: 1px solid #333;"></textarea>
                    <button onclick="submitReview('${repair.id}')" class="btn-primary" style="padding: 6px 15px; font-size: 0.8rem;">Submit Review</button>
                </div>
            `).join('');
        } else {
            list.innerHTML = '<div style="padding: 30px; text-align: center; background: rgba(255,255,255,0.01); border-radius: 12px; border: 1px dashed rgba(255,255,255,0.1);"><p style="color: #86868b;">No repair bookings found yet.</p></div>';
        }
    } catch (e) {
        list.innerHTML = '<p style="color: #f87171;">Failed to load repairs.</p>';
    }
}

function showReviewForm(id) {
    document.getElementById(`review-form-${id}`).style.display = 'block';
}

async function submitReview(id) {
    const rating = document.getElementById(`rating-${id}`).value;
    const comment = document.getElementById(`comment-${id}`).value;
    
    try {
        const res = await fetch('/api/add-review', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ rating, comment })
        });
        const data = await res.json();
        if (data.success) {
            alert(data.message);
            document.getElementById(`review-form-${id}`).style.display = 'none';
        }
    } catch (e) {
        alert('Error submitting review');
    }
}

function getStatusColor(status) {
    switch(status.toLowerCase()) {
        case 'pending': return '#f59e0b';
        case 'in progress': return '#3b82f6';
        case 'completed': return '#10b981';
        default: return '#6b7280';
    }
}

async function handleLogout() {
    await fetch('/api/logout');
    window.location.href = 'index.html';
}

function toggleEditMode() {
    const form = document.getElementById('edit-form');
    const input = document.getElementById('edit-name');
    const name = document.getElementById('profile-name').textContent;
    
    if (form.style.display === 'none') {
        form.style.display = 'block';
        input.value = name;
        input.focus();
    } else {
        form.style.display = 'none';
    }
}

async function saveProfile() {
    const name = document.getElementById('edit-name').value;
    if (!name) return;

    try {
        const res = await fetch('/api/update-profile', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name })
        });
        const data = await res.json();
        
        if (data.success) {
            document.getElementById('profile-name').textContent = data.user.name;
            document.getElementById('edit-form').style.display = 'none';
            // Refresh navigation greeting
            location.reload(); 
        } else {
            alert(data.message);
        }
    } catch (e) {
        alert('Error updating profile');
    }
}

function togglePasswordForm() {
    const form = document.getElementById('password-form');
    form.style.display = form.style.display === 'none' ? 'block' : 'none';
    if (form.style.display === 'block') {
        form.scrollIntoView({ behavior: 'smooth' });
    }
}

async function changePassword() {
    const currentPassword = document.getElementById('current-pw').value;
    const newPassword = document.getElementById('new-pw').value;
    const status = document.getElementById('pw-status');

    if (!currentPassword || !newPassword) return;

    status.textContent = '⌛ Processing...';
    status.style.color = '#60a5fa';

    try {
        const res = await fetch('/api/change-password', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ currentPassword, newPassword })
        });
        const data = await res.json();
        
        if (data.success) {
            status.textContent = '✅ ' + data.message;
            status.style.color = '#10b981';
            document.getElementById('current-pw').value = '';
            document.getElementById('new-pw').value = '';
            setTimeout(togglePasswordForm, 3000);
        } else {
            status.textContent = '❌ ' + data.message;
            status.style.color = '#f87171';
        }
    } catch (e) {
        status.textContent = '❌ Error changing password.';
        status.style.color = '#f87171';
    }
}
</script>

</body>
</html>
